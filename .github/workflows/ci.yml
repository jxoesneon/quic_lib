name: Dart QUIC CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-lint:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: [stable]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Detect Dart project
        id: detect
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "has_dart=true" >> "$GITHUB_OUTPUT"
            if [ -d "test" ]; then
              echo "has_tests=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_tests=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_dart=false" >> "$GITHUB_OUTPUT"
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Install dependencies
        if: steps.detect.outputs.has_dart == 'true'
        run: dart pub get

      - name: Run dart analyze
        if: steps.detect.outputs.has_dart == 'true'
        run: dart analyze

      - name: Check formatting
        if: steps.detect.outputs.has_dart == 'true'
        run: dart format --set-exit-if-changed .

      - name: Run tests
        if: steps.detect.outputs.has_dart == 'true' && steps.detect.outputs.has_tests == 'true'
        run: dart test

      - name: Lint documentation (spec-only repo)
        if: steps.detect.outputs.has_dart != 'true'
        run: |
          echo "No Dart project detected. This is a specification/documentation repository."
          echo "Uncomment the lines below to enable Markdown linting with markdownlint-cli."
          # npm install -g markdownlint-cli
          # markdownlint 'doc/**/*.md' 'README.md' || true

      - name: Verify spec completeness
        if: steps.detect.outputs.has_dart != 'true'
        run: |
          echo "Checking that all required specification files exist..."
          for file in README.md LICENSE doc/specs/INDEX.md doc/specs/ROADMAP.md; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done
          echo "All required files present."
