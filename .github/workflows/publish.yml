name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

jobs:
  validate:
    name: Validate before publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: dart pub get

      - name: Verify dart analyze (fatal on infos)
        run: dart analyze --fatal-infos

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Run tests
        run: dart test --concurrency=4

      - name: Check for outdated major dependencies
        run: |
          dart pub outdated --no-dev-dependencies --up-to-date --no-dependency-overrides > outdated.txt || true
          if grep -q "does not support the stable version" outdated.txt; then
            echo "Found dependencies that do not support their latest stable version:"
            grep "does not support the stable version" outdated.txt
            exit 1
          fi
          echo "All dependencies support their latest stable versions."

      - name: Verify example directory
        run: |
          if [ ! -d "example" ]; then
            echo "Missing example/ directory. Pub.dev will deduct 10 points."
            exit 1
          fi
          if [ ! -f "example/README.md" ]; then
            echo "Missing example/README.md. Pub.dev example detection may fail."
            exit 1
          fi
          dart_count=$(find example -name "*.dart" | wc -l)
          if [ "$dart_count" -eq 0 ]; then
            echo "No .dart files in example/. Pub.dev will deduct 10 points."
            exit 1
          fi
          echo "example/ directory verified ($dart_count .dart files)."

      - name: Dry-run publish
        run: dart pub publish --dry-run

  publish:
    name: Publish to pub.dev
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: dart pub get

      - name: Publish to pub.dev
        run: dart pub publish --force
