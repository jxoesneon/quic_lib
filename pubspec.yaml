name: quic_lib
description: >-
  A pure-Dart QUIC, HTTP/3, WebTransport, and libp2p transport stack.
version: 1.9.0
homepage: https://github.com/jxoesneon/quic_lib
repository: https://github.com/jxoesneon/quic_lib
issue_tracker: https://github.com/jxoesneon/quic_lib/issues
documentation: https://github.com/jxoesneon/quic_lib/tree/main/doc
license: MIT

topics:
  - networking
  - quic
  - http3
  - webtransport
  - libp2p

environment:
  sdk: ^3.0.0

dependencies:
  asn1lib: ^1.6.0
  cryptography: ^2.5.0
  pointycastle: ^4.0.0
  x509: ^0.2.3

dev_dependencies:
  benchmark: ^0.3.0
  coverage: ^1.15.1
  lints: ^4.0.0
  mocktail: ^1.0.0
  test: ^1.24.0

platforms:
  android:
  ios:
  linux:
  macos:
  windows:
